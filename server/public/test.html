<!DOCTYPE html>
<html>

<head>
    <title>Mafia Chat Test</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 40px auto;
        }

        #chat {
            border: 1px solid #ccc;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
        }

        .message {
            margin-bottom: 8px;
        }

        .system {
            color: gray;
            font-style: italic;
        }

        input {
            padding: 8px;
            width: 70%;
        }

        button {
            padding: 8px;
        }
    </style>
</head>

<body>

    <h2>Mafia Chat Test</h2>

    <div>
        <input id="username" placeholder="Username" />
        <input id="roomId" placeholder="Room ID" />
        <button onclick="join()">Join Room</button>
    </div>

    <div id="players"></div>

    <hr />

    <div>
        <button onclick="Start()">Start Game</button>
    </div>

    <hr />


    <div id="chat"></div>

    <div>
        <input id="messageInput" placeholder="Type message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>

        const socket = io('http://localhost:3000');
        const chatDiv = document.getElementById("chat");

        socket.on('connect', () => {
            socket.emit('createGame');
        })

        function join() {
            const username = document.getElementById("username").value;
            const roomId = document.getElementById("roomId").value;
            socket.emit("joinGame", { username, gameId: roomId });
        }

        socket.on("playerJoined", (players) => {
            updatePlayers(players);
        });

        function Start() {
            const roomId = document.getElementById("roomId").value;
            socket.emit("startGame", { gameId: roomId });
        }

        function sendMessage() {
            const input = document.getElementById("messageInput");
            const message = input.value;
            if (!message) return;
            socket.emit("chatMessage", { username: document.getElementById("username").value, message });
            input.value = "";
        }

        socket.on("chatMessage", (data) => {
            addMessage(`<strong>${data.username}</strong>: ${data.message}`);
        });

        socket.on("systemMessage", (data) => {
            addMessage(data.message, true);
        });

        socket.on("gameStarted", (game) => {
            console.log("Game started:", game);
            socket.emit('nightPhase', { gameId: game.id });
        });

        socket.on('phaseUpdate', (game) => {
            console.log('Phase update', game);
            if (game.phase === 'day') socket.emit('dayPhase', { gameId: game.id });
        });

        socket.on('gameOver', (game) => {
            console.log('Game over', game.winner);
        });

        function addMessage(message, isSystem = false) {
            const div = document.createElement("div");
            div.classList.add("message");
            if (isSystem) div.classList.add("system");
            div.innerHTML = message;
            chatDiv.appendChild(div);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        function updatePlayers(players) {
            const playersDiv = document.getElementById("players");
            playersDiv.innerHTML = "<h3>Players:</h3>";
            players.forEach(player => {
                const div = document.createElement("div");
                div.textContent = player.name;
                playersDiv.appendChild(div);
            });
        }
    </script>

</body>

</html>
